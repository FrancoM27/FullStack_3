version: '3.8'

services:
  mysql-server:
    image: mysql:8.0
    container_name: mysql_global
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper_local
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka_local
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  api-gateway:
    build: ./servicios-backend/api-gateway
    container_name: api_gateway
    ports:
      - "9000:9000"
    depends_on:
      mysql-server:
        condition: service_healthy
      kafka:
        condition: service_started

  servicio-usuarios:
    build: ./servicios-backend/servicio-usuarios
    container_name: app_usuarios
    ports:
      - "8080:8080"
    depends_on:
      mysql-server:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-server:3306/gb_usuarios
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root

  servicio-resenas:
    build: ./servicios-backend/servicio-resenas
    container_name: app_resenas
    ports:
      - "8081:8081"
    depends_on:
      mysql-server:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-server:3306/gb_resenas
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root

  servicio-pedidos:
    build: ./servicios-backend/servicio-pedidos
    container_name: app_pedidos
    ports:
      - "8082:8082"
    depends_on:
      mysql-server:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-server:3306/gb_pedidos
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092

  servicio-perfil:
    build: ./servicios-backend/servicio-perfil
    container_name: app_perfil
    ports:
      - "8084:8084"
    depends_on:
      mysql-server:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-server:3306/gb_perfil
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root

  servicio-productos:
    build: ./servicios-backend/servicio-productos
    container_name: app_productos
    ports:
      - "8085:8085"
    depends_on:
      mysql-server:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-server:3306/gb_productos
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092

  servicio-pagos:
    build: ./servicios-backend/servicio-pagos
    container_name: app_pagos
    ports:
      - "8086:8086"
    depends_on:
      mysql-server:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-server:3306/gb_pagos
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092

  frontend-react:
    build: ./gamebakes-web
    container_name: app_frontend
    ports:
      - "5173:80"
    depends_on:
      - api-gateway

volumes:
  db_data: