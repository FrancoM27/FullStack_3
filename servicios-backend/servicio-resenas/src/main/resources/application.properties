spring.application.name=servicio-resenas

server.port=8081

spring.datasource.url=jdbc:mysql://mysql-server:3306/gb_resenas?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root
spring.main.allow-bean-definition-overriding=true

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Feign Client Configuration
feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=10000
feign.client.config.servicio-pedidos.connectTimeout=5000
feign.client.config.servicio-pedidos.readTimeout=10000

# Circuit Breaker Configuration
resilience4j.circuitbreaker.instances.resenaCB.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.resenaCB.slidingWindowSize=10
resilience4j.circuitbreaker.instances.resenaCB.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.resenaCB.waitDurationInOpenState=5s
resilience4j.circuitbreaker.instances.resenaCB.failureRateThreshold=50

# Circuit Breaker para PedidoClient
resilience4j.circuitbreaker.instances.pedidoCB.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.pedidoCB.slidingWindowSize=10
resilience4j.circuitbreaker.instances.pedidoCB.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.pedidoCB.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.pedidoCB.failureRateThreshold=50

# Retry Configuration
spring.retry.max-attempts=3
spring.retry.backoff.delay=1000

# Cache Configuration
spring.cache.type=simple
spring.cache.cache-names=validacionesCompra,validacionesEntregado

# Kafka Configuration
spring.kafka.bootstrap-servers=kafka:29092
spring.kafka.consumer.group-id=servicio-resenas-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer