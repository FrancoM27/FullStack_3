spring.application.name=servicio-resenas

# Puerto donde correrá este microservicio (8081 para no chocar con el Front)
server.port=8081

# --- CONFIGURACIÓN PARA MYSQL (XAMPP) ---
spring.datasource.url=jdbc:mysql://localhost:3306/gamebakes_resenas?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# Dialecto para que Hibernate hable "idioma MySQL 8"
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# 'update' crea las tablas automáticamente si no existen
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# --- CONFIGURACIÓN CIRCUIT BREAKER ---
resilience4j.circuitbreaker.instances.resenaCB.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.resenaCB.slidingWindowSize=10
resilience4j.circuitbreaker.instances.resenaCB.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.resenaCB.waitDurationInOpenState=5s
resilience4j.circuitbreaker.instances.resenaCB.failureRateThreshold=50